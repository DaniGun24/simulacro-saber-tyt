<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulacro Saber TyT — ICFES</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display: flex; min-height: 100vh; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 420px; padding: 1.5rem; }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand h1 { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
    .login-brand p  { color: var(--text-2); font-size: .9rem; margin-top: .3rem; }
    .tab-switch { display: flex; background: var(--bg); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
    .tab-btn { flex: 1; padding: .5rem; border: none; background: transparent; border-radius: 7px; font-weight: 600; font-size: .9rem; cursor: pointer; transition: .15s; }
    .tab-btn.active { background: var(--surface); box-shadow: var(--shadow); color: var(--primary); }
    .form-panel { display: none; }
    .form-panel.active { display: flex; flex-direction: column; gap: 1rem; }
    .divider { text-align: center; color: var(--text-2); font-size: .85rem; margin: .5rem 0; position: relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--border); }
    .divider::before { left:0; }
    .divider::after  { right:0; }
    .recovery-link { font-size: .85rem; text-align: right; display: block; margin-top: -.5rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <h1>📋 Saber TyT</h1>
      <p>Simulacro oficial ICFES · Telecomunicaciones</p>
    </div>

    <div class="card">
      <!-- Tabs -->
      <div class="tab-switch">
        <button class="tab-btn active" id="tab-login" onclick="mostrarTab('login')">Ingresar</button>
        <button class="tab-btn" id="tab-register" onclick="mostrarTab('register')">Registrarse</button>
      </div>

      <!-- Alert global -->
      <div id="alert-box" class="alert hidden mb-2"></div>

      <!-- Panel Login -->
      <form id="form-login" class="form-panel active" onsubmit="hacerLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Correo electronico</label>
          <input class="form-input" id="login-email" type="email" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Contrasena</label>
          <input class="form-input" id="login-pass" type="password" placeholder="••••••••" required autocomplete="current-password">
          <a href="#" class="recovery-link" onclick="mostrarTab('recovery');return false;">Olvide mi contrasena</a>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="btn-login">
          <span>Ingresar</span>
        </button>
      </form>

      <!-- Panel Registro -->
      <form id="form-register" class="form-panel" onsubmit="hacerRegistro(event)">
        <div class="form-group">
          <label class="form-label" for="reg-nombre">Nombre completo</label>
          <input class="form-input" id="reg-nombre" type="text" placeholder="Nombre Apellido" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Correo electronico</label>
          <input class="form-input" id="reg-email" type="email" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass">Contrasena</label>
          <input class="form-input" id="reg-pass" type="password" placeholder="Minimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass2">Confirmar contrasena</label>
          <input class="form-input" id="reg-pass2" type="password" placeholder="Repetir contrasena" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-inst">Institucion <span style="font-weight:400;color:var(--text-2)">(opcional)</span></label>
          <input class="form-input" id="reg-inst" type="text" placeholder="Nombre de tu institucion">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-prog">Programa academico <span style="font-weight:400;color:var(--text-2)">(opcional)</span></label>
          <input class="form-input" id="reg-prog" type="text" placeholder="Ej: Tecnologia en Telecomunicaciones">
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="btn-register">
          <span>Crear cuenta</span>
        </button>
      </form>

      <!-- Panel Recuperacion -->
      <div id="form-recovery" class="form-panel">
        <p style="font-size:.9rem;color:var(--text-2);margin-bottom:.5rem;">Ingresa tu correo y te enviaremos instrucciones para restablecer tu contrasena.</p>
        <div class="form-group">
          <label class="form-label" for="rec-email">Correo electronico</label>
          <input class="form-input" id="rec-email" type="email" placeholder="tu@correo.com" required>
        </div>
        <button class="btn btn-primary w-full" onclick="enviarRecuperacion()">Enviar instrucciones</button>
        <button class="btn btn-ghost w-full btn-sm" onclick="mostrarTab('login')">← Volver al login</button>
      </div>
    </div>

    <!-- Estado Google Sheets -->
    <div id="sheets-status" class="alert alert-warning mt-2 hidden">
      <span>⚠️</span> <span id="sheets-msg">Google Sheets no configurado. Configura tus credenciales en <a href="admin.html">Configuracion</a>.</span>
    </div>
  </div>

  <!-- Contenedor de toasts -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // APIs de Google (GIS + GAPI)
    let gapiReady = false;
    let gisReady  = false;

    function gapiLoaded()  { gapiReady = true;  checkInit(); }
    function gisLoaded()   { gisReady  = true;  checkInit(); }

    async function checkInit() {
      if (!gapiReady || !gisReady) return;
      try {
        await Sheets.inicializar();
        if (CONFIG.SPREADSHEET_ID === 'TU_SPREADSHEET_ID_AQUI') {
          document.getElementById('sheets-status').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('sheets-status').classList.remove('hidden');
        document.getElementById('sheets-msg').textContent = 'Error al conectar con Google Sheets: ' + e.message;
      }
    }

    // Redirigir si ya hay sesion activa
    window.addEventListener('DOMContentLoaded', () => {
      const sesion = obtenerUsuarioActual();
      if (sesion) window.location.href = 'dashboard.html';
    });

    function mostrarTab(tab) {
      ['login','register','recovery'].forEach(t => {
        document.getElementById(`form-${t}`).classList.toggle('active', t === tab);
        const btn = document.getElementById(`tab-${t}`);
        if (btn) btn.classList.toggle('active', t === tab);
      });
      document.getElementById('alert-box').classList.add('hidden');
    }

    function mostrarAlerta(msg, tipo = 'error') {
      const box = document.getElementById('alert-box');
      box.className = `alert alert-${tipo} mb-2`;
      box.textContent = msg;
      box.classList.remove('hidden');
    }

    function setBtnLoading(id, cargando) {
      const btn = document.getElementById(id);
      btn.disabled = cargando;
      btn.innerHTML = cargando
        ? '<span class="spinner" style="width:20px;height:20px;border-width:3px"></span>'
        : (id === 'btn-login' ? '<span>Ingresar</span>' : '<span>Crear cuenta</span>');
    }

    async function hacerLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const contrasena = document.getElementById('login-pass').value;
      setBtnLoading('btn-login', true);
      try {
        await Sheets.autenticar();
        await loginUsuario(email, contrasena);
        window.location.href = 'dashboard.html';
      } catch (err) {
        mostrarAlerta(err.message || 'Error al iniciar sesion.');
        setBtnLoading('btn-login', false);
      }
    }

    async function hacerRegistro(e) {
      e.preventDefault();
      const nombre  = document.getElementById('reg-nombre').value.trim();
      const email   = document.getElementById('reg-email').value.trim();
      const pass    = document.getElementById('reg-pass').value;
      const pass2   = document.getElementById('reg-pass2').value;
      const inst    = document.getElementById('reg-inst').value.trim();
      const prog    = document.getElementById('reg-prog').value.trim();

      if (pass !== pass2) { mostrarAlerta('Las contrasenas no coinciden.'); return; }
      if (pass.length < 6) { mostrarAlerta('La contrasena debe tener al menos 6 caracteres.'); return; }

      setBtnLoading('btn-register', true);
      try {
        await Sheets.autenticar();
        await registrarUsuario(nombre, email, pass, inst, prog);
        window.location.href = 'dashboard.html';
      } catch (err) {
        mostrarAlerta(err.message || 'Error al crear la cuenta.');
        setBtnLoading('btn-register', false);
      }
    }

    async function enviarRecuperacion() {
      const email = document.getElementById('rec-email').value.trim();
      if (!email) { mostrarAlerta('Ingresa tu correo electronico.'); return; }
      // Con EmailJS o similar; por ahora mostramos mensaje informativo
      mostrarAlerta('Si el correo existe en el sistema, recibiras instrucciones en los proximos minutos.', 'success');
    }

    function toast(msg, tipo = '') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${tipo}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }
  </script>

  <!-- Google APIs -->
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
